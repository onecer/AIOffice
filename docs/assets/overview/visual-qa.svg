<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Visual QA loop for generated Office documents</title>
  <desc id="desc">The visual quality loop renders documents, checks for overlap and overflow, fixes layout, and renders again.</desc>
  <defs>
    <style>
      .bg { fill: #fffdf7; }
      .ink { fill: #1c1917; }
      .muted { fill: #6b7280; }
      .panel { fill: #ffffff; stroke: #d6d3d1; stroke-width: 2; }
      .build { fill: #e0f2fe; stroke: #0369a1; }
      .render { fill: #fef3c7; stroke: #b7791f; }
      .look { fill: #fee2e2; stroke: #c2410c; }
      .fix { fill: #dcfce7; stroke: #15803d; }
      .arrow { stroke: #57534e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #78716c; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      text { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .h1 { font-size: 34px; font-weight: 760; }
      .h2 { font-size: 23px; font-weight: 760; }
      .body { font-size: 17px; }
      .small { font-size: 14px; }
      .label { font-size: 13px; font-weight: 760; letter-spacing: .5px; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#57534e" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="ink h1" x="56" y="66">Visual QA is part of the document contract</text>
  <text class="muted body" x="58" y="100">Office files can validate but still look wrong. Render, inspect, fix, and render again before shipping.</text>

  <rect class="panel" x="72" y="164" width="236" height="238" rx="22"/>
  <rect class="build" x="102" y="196" width="176" height="48" rx="16"/>
  <text class="ink h2" x="126" y="228">Build</text>
  <text class="muted body" x="104" y="282">Theme, fills, fonts,</text>
  <text class="muted body" x="104" y="312">data labels, axes,</text>
  <text class="muted body" x="104" y="342">alt text, metadata</text>

  <rect class="panel" x="376" y="164" width="236" height="238" rx="22"/>
  <rect class="render" x="406" y="196" width="176" height="48" rx="16"/>
  <text class="ink h2" x="430" y="228">Render</text>
  <text class="muted body" x="408" y="282">chromium for speed</text>
  <text class="muted body" x="408" y="312">soffice for fidelity</text>
  <text class="muted body" x="408" y="342">png/pdf for review</text>

  <rect class="panel" x="680" y="164" width="236" height="238" rx="22"/>
  <rect class="look" x="710" y="196" width="176" height="48" rx="16"/>
  <text class="ink h2" x="744" y="228">Look</text>
  <text class="muted body" x="712" y="282">No covered text</text>
  <text class="muted body" x="712" y="312">No overflow</text>
  <text class="muted body" x="712" y="342">No clipped footer</text>

  <rect class="panel" x="984" y="164" width="236" height="238" rx="22"/>
  <rect class="fix" x="1014" y="196" width="176" height="48" rx="16"/>
  <text class="ink h2" x="1054" y="228">Fix</text>
  <text class="muted body" x="1016" y="282">Resize or move</text>
  <text class="muted body" x="1016" y="312">Shorten labels</text>
  <text class="muted body" x="1016" y="342">Use autofit shrink</text>

  <path class="arrow" d="M308 283 L376 283"/>
  <path class="arrow" d="M612 283 L680 283"/>
  <path class="arrow" d="M916 283 L984 283"/>
  <path class="loop" d="M1102 402 C1048 552 254 552 190 402"/>

  <rect class="panel" x="142" y="500" width="996" height="98" rx="24"/>
  <text class="ink h2" x="184" y="544">Fast checklist:</text>
  <text class="muted body" x="350" y="544">headlines fit, chart labels readable, tables not cropped, images not stretched,</text>
  <text class="muted body" x="350" y="574">safe margins preserved, screenshots show the actual file state.</text>

  <text class="muted small" x="58" y="664">Tip: use preview marks/goto during review, and keep screenshots next to the docs when explaining a workflow.</text>
</svg>
